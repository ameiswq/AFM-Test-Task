services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  api:
    build: .
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: transactions
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8000:8000"